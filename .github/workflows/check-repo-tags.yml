name: Check Repo Tags

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Validate repo tagging convention
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CATEGORY_TOPICS="game-challenge game-project misc"
          VIOLATIONS=""

          REPOS=$(gh api --paginate '/orgs/p2c2-acacia/repos?per_page=100' \
            --jq '.[] | {name, topics, visibility}')

          echo "$REPOS" | jq -s '.' | jq -r '.[] | @base64' | while read -r encoded; do
            repo=$(echo "$encoded" | base64 -d)
            name=$(echo "$repo" | jq -r '.name')
            topics=$(echo "$repo" | jq -r '.topics[]' 2>/dev/null)

            # Count category topics
            cat_count=0
            has_game_challenge=false
            for cat in $CATEGORY_TOPICS; do
              if echo "$topics" | grep -qx "$cat"; then
                cat_count=$((cat_count + 1))
                if [ "$cat" = "game-challenge" ]; then
                  has_game_challenge=true
                fi
              fi
            done

            # Check 1: Must have exactly one category topic
            if [ "$cat_count" -eq 0 ]; then
              echo "MISSING_CATEGORY:${name}" >> /tmp/violations.txt
            elif [ "$cat_count" -gt 1 ]; then
              echo "MULTIPLE_CATEGORIES:${name}" >> /tmp/violations.txt
            fi

            # Check 2: game-challenge must have p2c2-XXXX
            if [ "$has_game_challenge" = true ]; then
              p2c2_count=$(echo "$topics" | grep -c "^p2c2-" 2>/dev/null || echo 0)
              if [ "$p2c2_count" -eq 0 ]; then
                echo "MISSING_P2C2:${name}" >> /tmp/violations.txt
              elif [ "$p2c2_count" -gt 1 ]; then
                echo "MULTIPLE_P2C2:${name}" >> /tmp/violations.txt
              fi
            fi
          done

          if [ -f /tmp/violations.txt ]; then
            echo "## Tagging violations found:"
            BODY="## Repo Tagging Violations\n\nThe following repositories have tagging issues:\n\n"

            while IFS= read -r line; do
              type=$(echo "$line" | cut -d: -f1)
              repo=$(echo "$line" | cut -d: -f2)
              case "$type" in
                MISSING_CATEGORY) msg="missing a category topic (\`game-challenge\`, \`game-project\`, or \`misc\`)" ;;
                MULTIPLE_CATEGORIES) msg="has multiple category topics (should have exactly one)" ;;
                MISSING_P2C2) msg="tagged \`game-challenge\` but missing \`p2c2-XXXX\` topic" ;;
                MULTIPLE_P2C2) msg="has multiple \`p2c2-XXXX\` topics (should have exactly one)" ;;
              esac
              BODY="${BODY}- **${repo}**: ${msg}\n"
              echo "  - ${repo}: ${msg}"
            done < /tmp/violations.txt

            BODY="${BODY}\n---\n*Auto-generated by check-repo-tags workflow*"

            # Create or update issue
            EXISTING=$(gh issue list --repo p2c2-acacia/.github --label "repo-tagging" --state open --json number --jq '.[0].number' 2>/dev/null)

            if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
              gh issue edit "$EXISTING" --repo p2c2-acacia/.github --body "$(echo -e "$BODY")"
              echo "Updated existing issue #${EXISTING}"
            else
              gh issue create --repo p2c2-acacia/.github \
                --title "Repo tagging violations detected" \
                --body "$(echo -e "$BODY")" \
                --label "repo-tagging"
              echo "Created new issue"
            fi

            exit 1
          else
            echo "All repos properly tagged!"

            # Close any open tagging issues
            EXISTING=$(gh issue list --repo p2c2-acacia/.github --label "repo-tagging" --state open --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
              gh issue close "$EXISTING" --repo p2c2-acacia/.github --comment "All repos are now properly tagged."
            fi
          fi
